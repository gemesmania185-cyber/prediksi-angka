<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Jarak & Harga</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a5acd, #7b68ee);
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 15px;
}

.header {
  background: linear-gradient(135deg, #00c853, #009688);
  color: white;
  text-align: center;
  padding: 20px;
  border-radius: 15px;
}

.card {
  background: white;
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  color: #5c6bc0;
  margin-bottom: 10px;
}

.info {
  background: #fff3cd;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 5px;
  margin-bottom: 15px;
}

.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  margin-bottom: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, #6a5acd, #7b1fa2);
}

.btn-outline {
  background: white;
  color: #5c6bc0;
  border: 2px solid #5c6bc0;
}

.result {
  margin-top: 10px;
  padding: 10px;
  background: #e8f5e9;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>👦 Kalkulator Jarak & Harga</h2>
    <p>Layanan Pijat Seluruh Badan</p>
  </div>

  <div class="card">
    <div class="title">📍 Hitung Jarak & Harga</div>

    <div class="info">
      💡 Masukkan jarak dari lokasi kami untuk melihat harga layanan
    </div>

    <label>Jarak dari Lokasi Kami (km)</label>
    <input type="number" id="jarak" placeholder="Contoh: 2">

    <button class="btn btn-primary" onclick="hitung()">🔍 Hitung Jarak & Harga</button>
    <button class="btn btn-outline" onclick="tabel()">📋 Lihat Tabel Tarif</button>

    <div id="hasil" class="result"></div>
  </div>

</div>

<script>
function hitung() {
  let jarak = document.getElementById("jarak").value;
  
  if (!jarak) {
    alert("Masukkan jarak dulu!");
    return;
  }

  let harga = 0;

  if (jarak <= 2) harga = 50000;
  else if (jarak <= 5) harga = 75000;
  else if (jarak <= 10) harga = 100000;
  else harga = 150000;

  document.getElementById("hasil").innerHTML =
    "💰 Harga: Rp " + harga.toLocaleString();
}

function tabel() {
  alert(
    "📋 Tabel Tarif:\n\n" +
    "0 - 2 km : 50.000\n" +
    "3 - 5 km : 75.000\n" +
    "6 - 10 km : 100.000\n" +
    ">10 km : 150.000"
  );
}
</script>

</body>
</html>

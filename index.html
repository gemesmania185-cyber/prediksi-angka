<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Number Prediction and Dream Interpretation</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Number Prediction and Dream Interpretation</h1>\n    </header>\n    <main>\n        <section id="number-prediction">\n            <h2>Number Prediction</h2>\n            <form id="prediction-form">\n                <label for="user-number">Enter a number:</label>\n                <input type="number" id="user-number" name="user-number" required>\n                <button type="submit">Predict</button>\n            </form>\n            <div id="prediction-result"></div>\n        </section>\n        <section id="dream-interpretation">\n            <h2>Dream Interpretation</h2>\n            <form id="dream-form">\n                <label for="dream-description">Describe your dream:</label>\n                <textarea id="dream-description" name="dream-description" required></textarea>\n                <button type="submit">Interpret</button>\n            </form>\n            <div id="interpretation-result"></div>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 Number Prediction and Dream Interpretation</p>\n    </footer>\n</body>\n</html>
